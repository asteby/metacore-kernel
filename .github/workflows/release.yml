name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Notify Go proxy
        # Go proxy auto-indexa al hacer push de tag, pero acelera con goproxy request
        run: |
          MODULE="github.com/asteby/metacore-kernel"
          TAG="${GITHUB_REF#refs/tags/}"
          curl -s "https://proxy.golang.org/${MODULE}/@v/${TAG}.info" || true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dispatch consumer bumps
        # Optional: fire repository_dispatch on consumer repositories so they can
        # subscribe via `on: repository_dispatch` and run Renovate immediately
        # after a kernel release.
        #
        # The list of consumer repositories is read from the `CONSUMER_REPOS`
        # repository variable (NOT a secret). Configure it in:
        #   Settings -> Secrets and variables -> Actions -> Variables
        # Format: space-separated `owner/repo` entries, e.g.
        #   owner/app-one owner/app-two
        # Leave the variable unset/empty to skip the dispatch.
        run: |
          for REPO in ${{ vars.CONSUMER_REPOS }}; do
            gh api -X POST "repos/${REPO}/dispatches" -f event_type=metacore-kernel-released || true
          done
        env:
          GH_TOKEN: ${{ secrets.CROSSREPO_DISPATCH_TOKEN }}
        continue-on-error: true
