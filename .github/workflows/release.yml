name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Notify Go proxy
        # Go proxy auto-indexa al hacer push de tag, pero acelera con goproxy request
        run: |
          MODULE="github.com/asteby/metacore-kernel"
          TAG="${GITHUB_REF#refs/tags/}"
          curl -s "https://proxy.golang.org/${MODULE}/@v/${TAG}.info" || true

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
